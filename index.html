<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>가위바위보 게임</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial; text-align: center; background:#f5f5f5; color:#111; }
    .dark { background:#111; color:#eee; }
    button { padding:10px 15px; margin:5px; cursor:pointer; }
    .top-bar { position:fixed; top:10px; right:10px; }
    table { margin:10px auto; border-collapse: collapse; }
    td, th { border:1px solid #999; padding:5px 10px; }
    canvas { max-width:400px; margin:20px auto; }
  </style>
</head>
<body>

<div class="top-bar">
  <button onclick="toggleDark()">🌙 다크모드</button>
  <button onclick="toggleStats()">📊 통계</button>
</div>

<h1>가위 ✌️ 바위 ✊ 보 ✋</h1>

<div>
  <button onclick="play('가위')">가위</button>
  <button onclick="play('바위')">바위</button>
  <button onclick="play('보')">보</button>
</div>

<h2 id="result"></h2>
<h3 id="score"></h3>

<div id="celebration" style="font-size:40px; display:none;">🎉🎉🎉</div>

<div id="stats" style="display:none;">
  <table>
    <tr><th>승</th><th>패</th><th>무</th><th>승률</th></tr>
    <tr><td id="win"></td><td id="lose"></td><td id="draw"></td><td id="rate"></td></tr>
  </table>
  <canvas id="chart"></canvas>
</div>

<script>
let userScore=0, compScore=0;
let win=0, lose=0, draw=0;
let history=[];
let chart;

function play(user){
  if(userScore===3 || compScore===3) return;
  const choices=['가위','바위','보'];
  const comp=choices[Math.floor(Math.random()*3)];

  let result="";
  if(user===comp){ result="무승부"; draw++; }
  else if((user==='가위'&&comp==='보')||(user==='바위'&&comp==='가위')||(user==='보'&&comp==='바위')){
    result="승리"; userScore++; win++;
  } else { result="패배"; compScore++; lose++; }

  document.getElementById('result').innerText=`${result} (나:${user} vs 컴:${comp})`;
  document.getElementById('score').innerText=`점수: ${userScore} : ${compScore}`;

  history.push(win/(win+lose+draw));
  updateStats();

  if(userScore===3 || compScore===3){ endGame(); }
}

function endGame(){
  const msg = userScore===3 ? "🎉 축하합니다! 승리!" : "😢 아쉽네요, 다음엔 이겨요!";
  document.getElementById('result').innerText = msg;

  if(userScore===3){
    let c=document.getElementById('celebration');
    c.style.display='block';
    setTimeout(()=>c.style.display='none',2000);
  }

  setTimeout(()=>{
    if(confirm('다시 하시겠습니까?')) reset();
  },500);
}

function reset(){
  userScore=0; compScore=0;
  document.getElementById('score').innerText='';
  document.getElementById('result').innerText='';
}

function toggleDark(){ document.body.classList.toggle('dark'); }

function toggleStats(){
  let s=document.getElementById('stats');
  s.style.display = s.style.display==='none'?'block':'none';
}

function updateStats(){
  document.getElementById('win').innerText=win;
  document.getElementById('lose').innerText=lose;
  document.getElementById('draw').innerText=draw;
  let total=win+lose+draw;
  document.getElementById('rate').innerText = total? (win/total*100).toFixed(1)+'%':'';

  if(!chart){
    chart=new Chart(document.getElementById('chart'),{
      type:'line',
      data:{labels:history.map((_,i)=>i+1),datasets:[{label:'승률',data:history}]}
    });
  } else {
    chart.data.labels=history.map((_,i)=>i+1);
    chart.data.datasets[0].data=history;
    chart.update();
  }
}
</script>

</body>
</html>
